<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Login Administrador</title>

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/admin.css">
</head>
<body>

  <main class="admin-login-page">

    <section class="admin-login-card">
      <h1>Acceso administrador</h1>

      <p>
        Ingrese con el correo y la contraseña autorizados para revisar registros de egresados.
      </p>

      <form id="formAdminLogin" class="admin-form">

        <div class="form-group">
          <label for="correoAdmin">Correo electrónico</label>
          <input id="correoAdmin" type="email" placeholder="admin@ejemplo.com" required>
        </div>

        <div class="form-group">
          <label for="passwordAdmin">Contraseña</label>
          <input id="passwordAdmin" type="password" placeholder="Ingrese la contraseña" required>
        </div>

        <button type="submit" class="btn-admin">Ingresar</button>

      </form>

      <a href="../index.html" class="back-link">Volver al inicio</a>
    </section>

  </main>

  <script type="module" src="../js/admin-login.js"></script>
</body>
</html>

<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Recuperar contraseña</title>

  <link rel="stylesheet" href="../css/style.css">
  <link rel="stylesheet" href="../css/login-egresado.css">
</head>
<body>

  <main class="login-page">

    <section class="login-card small-card">

      <h1>Recuperar contraseña</h1>

      <p>
        Escriba el correo registrado. Le enviaremos un enlace para cambiar su contraseña.
      </p>

      <form id="formRecuperarPassword" class="login-form">

        <div class="form-group">
          <label for="correoRecuperacion">Correo electrónico</label>
          <input 
            id="correoRecuperacion" 
            type="email" 
            placeholder="correo@ejemplo.com" 
            required
          >
        </div>

        <button type="submit" class="btn-login">
          Enviar enlace
        </button>

      </form>

      <p id="mensajeRecuperacion" class="mensaje-recuperacion"></p>

      <div class="login-links">
        <a href="login-egresado.html">Volver al inicio de sesión</a>
      </div>

    </section>

  </main>

  <script type="module" src="../js/recuperar-password.js"></script>
</body>
</html>

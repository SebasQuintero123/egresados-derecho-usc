<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Egresado</title>

  <link rel="stylesheet" href="../css/style.css?v=6">
  <link rel="stylesheet" href="../css/registro-egresado.css?v=2">
</head>
<body>

  <main class="register-page">

    <section class="register-card">

      <h1>Registro de egresado</h1>

      <p class="register-text">
        Complete sus datos para crear la cuenta en el portal de egresados.
        La información será revisada antes de activar el acceso completo.
      </p>

      <form id="formRegistro" class="register-form">

        <div class="form-group">
          <label for="nombre">Nombre completo</label>
          <input 
            id="nombre" 
            type="text" 
            placeholder="Escriba su nombre completo" 
            required
          >
        </div>

        <div class="form-group">
          <label for="documento">Número de documento</label>
          <input 
            id="documento" 
            type="text" 
            placeholder="Escriba su número de documento" 
            required
          >
        </div>

        <div class="form-group">
          <label for="programa">Programa académico</label>
          <input 
            id="programa" 
            type="text" 
            value="Derecho" 
            readonly
          >
        </div>

        <div class="form-group">
          <label for="anioGrado">Año de grado</label>
          <input 
            id="anioGrado" 
            type="number" 
            placeholder="Ejemplo: 2024" 
            min="1950" 
            max="2035" 
            required
          >
        </div>

        <div class="form-group">
          <label for="correo">Correo electrónico</label>
          <input 
            id="correo" 
            type="email" 
            placeholder="correo@ejemplo.com" 
            required
          >
        </div>

        <div class="form-group">
          <label for="celular">Celular</label>
          <input 
            id="celular" 
            type="text" 
            placeholder="Número de contacto"
          >
        </div>

        <div class="form-group">
          <label for="ciudad">Ciudad de residencia</label>
          <input 
            id="ciudad" 
            type="text" 
            placeholder="Ciudad de residencia"
          >
        </div>

        <div class="form-group">
          <label for="cargoActual">Cargo actual</label>
          <input 
            id="cargoActual" 
            type="text" 
            placeholder="Ejemplo: Abogado litigante"
          >
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input 
            id="password" 
            type="password" 
            placeholder="Cree una contraseña" 
            required
          >
        </div>

        <div class="form-group">
          <label for="confirmarPassword">Confirmar contraseña</label>
          <input 
            id="confirmarPassword" 
            type="password" 
            placeholder="Repita la contraseña" 
            required
          >
        </div>

        <label class="check">
          <input id="autorizacion" type="checkbox" required>
          <span>
            Autorizo el tratamiento de mis datos personales y confirmo que la
            información registrada es verídica.
          </span>
        </label>

        <div class="form-note">
          Su cuenta quedará en estado pendiente hasta que sea revisada y aprobada
          por el administrador de la plataforma.
        </div>

        <button type="submit" class="btn-register">
          Crear cuenta de egresado
        </button>

      </form>

      <a href="egresado.html" class="back-link">
        Volver al acceso de egresados
      </a>

    </section>

  </main>

  <script type="module" src="../js/registro-egresado.js?v=2"></script>
</body>
</html>

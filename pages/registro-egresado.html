<!DOCTYPE html>
<html lang="es">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Registro Egresado</title>

  <link rel="stylesheet" href="../css/registro-egresado.css">
</head>
<body>

  <main class="register-page">
    <section class="register-card">

      <h1>Registro de egresado</h1>

      <p class="register-text">
        Complete sus datos para crear la cuenta en el portal de egresados.
      </p>

      <form id="formRegistro" class="register-form">

        <div class="form-group">
          <label for="nombre">Nombre completo</label>
          <input id="nombre" type="text" placeholder="Escriba su nombre completo" required>
        </div>

        <div class="form-group">
          <label for="documento">Número de documento</label>
          <input id="documento" type="text" placeholder="Escriba su documento" required>
        </div>

        <div class="form-group">
          <label for="programa">Programa académico</label>
          <input id="programa" type="text" value="Derecho" required>
        </div>

        <div class="form-group">
          <label for="anioGrado">Año de grado</label>
          <input id="anioGrado" type="date" required>
        </div>

        <div class="form-group">
          <label for="correo">Correo electrónico</label>
          <input id="correo" type="email" placeholder="correo@ejemplo.com" required>
        </div>

        <div class="form-group">
          <label for="celular">Celular</label>
          <input id="celular" type="text" placeholder="Número de contacto">
        </div>

        <div class="form-group">
          <label for="ciudad">Ciudad de residencia</label>
          <input id="ciudad" type="text" placeholder="Ciudad">
        </div>

        <div class="form-group">
          <label for="cargoActual">Cargo Actual</label>
          <input id="cargoActual" type="text">
        </div>

        <div class="form-group">
          <label for="password">Contraseña</label>
          <input id="password" type="password" placeholder="Cree una contraseña" required>
        </div>

        <div class="form-group">
          <label for="confirmarPassword">Confirmar contraseña</label>
          <input id="confirmarPassword" type="password" placeholder="Repita la contraseña" required>
        </div>

        <label class="check">
          <input id="autorizacion" type="checkbox" required>
          <span>Autorizo el tratamiento de mis datos personales.</span>
        </label>

        <button type="submit" class="btn-register">Registrarme</button>
      </form>

      <a href="egresado.html" class="back-link">Volver</a>
    </section>
  </main>

  <script type="module" src="../js/registro-egresado.js"></script>
</body>
</html>
